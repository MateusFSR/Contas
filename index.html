<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle Financeiro | Inter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
        <div class="bank-card">
            <h3 class="bank-label">Selecionar Período</h3>
            <div class="meses-scroll">
                <button class="mes-btn" onclick="mudarMes('Janeiro')">Janeiro</button>
                <button class="mes-btn" onclick="mudarMes('Fevereiro')">Fevereiro</button>
                <button class="mes-btn" onclick="mudarMes('Março')">Março</button>
                <button class="mes-btn" onclick="mudarMes('Abril')">Abril</button>
                <button class="mes-btn" onclick="mudarMes('Maio')">Maio</button>
                <button class="mes-btn" onclick="mudarMes('Junho')">Junho</button>
                <button class="mes-btn ativo" onclick="mudarMes('Julho')">Julho</button>
                <button class="mes-btn" onclick="mudarMes('Agosto')">Agosto</button>
                <button class="mes-btn" onclick="mudarMes('Setembro')">Setembro</button>
                <button class="mes-btn" onclick="mudarMes('Outubro')">Outubro</button>
                <button class="mes-btn" onclick="mudarMes('Novembro')">Novembro</button>
                <button class="mes-btn" onclick="mudarMes('Dezembro')">Dezembro</button>
            </div>
            <input type="hidden" id="filtroMes" value="">
        </div>

        <div id="resumo"></div>

        <div id="lista"></div>

        <footer class="bank-footer">
            <button class="btn-action" onclick="exportarExcel()">
                <span class="icon">📊</span> Exportar Excel
            </button>
            <label for="importarFile" class="btn-action">
                <span class="icon">📥</span> Importar Excel
            </label>
            <input type="file" id="importarFile" accept=".xlsx, .xls, .csv" onchange="importarExcel(this)" style="display: none;">
        </footer>
    </main>

    <div class="floating-group">
        <button class="btn-float" onclick="toggleDarkMode()" title="Modo Escuro">
            <span class="icon">🌙</span>
        </button>
        <button class="btn-float" onclick="abrirDashboard()" title="Ver Dashboard">
            <span class="icon">📈</span>
        </button>
        <button class="btn-float btn-save-main" id="btnSalvar" onclick="salvarNoBanco()" title="Salvar na Nuvem">
            <span class="icon">☁️</span>
            <small>Salvar</small>
        </button>
    </div>

    <div id="dashboardModal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharDashboard()">&times;</span>
            <h2 style="color: var(--inter-orange);">Análise Mensal</h2>
            <div class="graficos-container">
                <div class="chart-box"><canvas id="graficoDistribuicao"></canvas></div>
                <div class="chart-box"><canvas id="graficoCategoria"></canvas></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
