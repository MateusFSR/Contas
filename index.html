<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle Financeiro Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>Selecionar Mês</h2>
        <div class="mes-botoes">
            <button class="mes-btn" onclick="mudarMes('Janeiro')">Janeiro</button>
            <button class="mes-btn" onclick="mudarMes('Fevereiro')">Fevereiro</button>
            <button class="mes-btn" onclick="mudarMes('Março')">Março</button>
            <button class="mes-btn" onclick="mudarMes('Abril')">Abril</button>
            <button class="mes-btn" onclick="mudarMes('Maio')">Maio</button>
            <button class="mes-btn" onclick="mudarMes('Junho')">Junho</button>
            <button class="mes-btn ativo" onclick="mudarMes('Julho')">Julho</button>
            <button class="mes-btn" onclick="mudarMes('Agosto')">Agosto</button>
            <button class="mes-btn" onclick="mudarMes('Setembro')">Setembro</button>
            <button class="mes-btn" onclick="mudarMes('Outubro')">Outubro</button>
            <button class="mes-btn" onclick="mudarMes('Novembro')">Novembro</button>
            <button class="mes-btn" onclick="mudarMes('Dezembro')">Dezembro</button>
        </div>
        <input type="hidden" id="filtroMes" value="Julho">
    </div>

    <div class="card">
        <h2>Adicionar</h2>
        <div class="form-linha">
            <input id="desc" placeholder="Descrição">
            <input id="valor" type="number" placeholder="Valor">
        </div>
        <div class="form-linha">
            <select id="cat">
                <option>Entrada</option>
                <option>Necessidades</option>
                <option>Pessoal</option>
                <option>Guardar</option>
            </select>
            <select id="origem">
                <option>Pagamento</option>
                <option>Adiantamento</option>
            </select>
        </div>
        <button onclick="adicionar()">Adicionar</button>
    </div>

    <div id="resumo"></div>
    <div id="lista"></div>

    <div class="rodape-dados">
        <button onclick="exportarExcel()" class="btn-dados">📤 Exportar Excel</button>
        <label for="importarFile" class="btn-dados">📥 Importar Excel</label>
        <input type="file" id="importarFile" accept=".xlsx, .xls, .csv" onchange="importarExcel(this)" style="display: none;">
    </div>

    <button onclick="toggleDarkMode()" id="btnDarkMode" class="btn-dark-float">🌙</button>
    <button onclick="salvarNoBanco()" id="btnSalvar" class="btn-salvar-float">☁️<br>Salvar</button>
    <div class="dashboard-float" onclick="abrirDashboard()">📊</div>

    <div id="dashboardModal" class="dashboard-modal">
        <div class="dashboard-conteudo">
            <div class="dashboard-header">
                <h2>Dashboard Financeiro</h2>
                <button class="fechar-dashboard" onclick="fecharDashboard()">✕</button>
            </div>
            <div class="dashboard-body">
                <canvas id="graficoCategoria"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
